<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Room Portfolio</title>
    <!-- Vinculamos el CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Contenedor del modelo -->
<model-viewer 
    id="room-model"
    src="practica.glb" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1" 
    exposure="1.2"
    camera-orbit="45deg 75deg 10m"
    min-camera-orbit="auto auto 1m"
    max-camera-orbit="auto auto 70m">
</model-viewer>

    <!-- Cargamos el script de Model Viewer y nuestro JS propio -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
