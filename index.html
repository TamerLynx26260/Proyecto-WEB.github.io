<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carlos Morales - Portfolio 3D</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>

    <div class="main-container">
        <model-viewer 
            id="room-model"
            src="Practica2.glb" 
            camera-controls 
            auto-rotate 
            shadow-intensity="1" 
            exposure="1.2"
            camera-orbit="45deg 75deg 10m"
            min-camera-orbit="auto auto 5m"
            max-camera-orbit="auto auto 70m">
        </model-viewer>

        <aside class="info-sidebar">
            <div class="card">
                <h3>About Me</h3>
                <p>Estudiante de Ing. en Sistemas.</p>
            </div>

            <div class="card">
                <h3>My Work</h3>
                <p>Proyectos de modelado 3D y desarrollo web.</p>
            </div>

            <div class="card contact-section">
                <h3>Contact</h3>
                <p class="user-name">Carlos Morales</p>
                <div class="social-icons">
                    <a href="https://github.com/TamerLynx26260" class="circle-icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Github">
                    </a>
                    <a href="https://www.instagram.com/tamer26_260" class="circle-icon">
                        <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
                    </a>
                </div>
            </div>

            <div class="footer-controls">
                <!-- Selector de música -->
                <div class="music-player">
                    <label for="music-upload" class="music-btn">
                        <div class="play-circle">▶</div>
                    </label>
                    <input type="file" id="music-upload" accept="audio/*" style="display:none">
                    <div class="music-info">
                        <p id="track-name">Now Playing: Select your music</p>
                    </div>
                </div>
                <audio id="bg-audio" loop></audio>

                <!-- Botón Reset con icono de cámara de image_723ec1.png -->
                <button class="reset-btn" id="btn-reset">
                    <div class="camera-icon-wrapper">
                        <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" alt="Reset">
                    </div>
                    <span>Reset Camera</span>
                </button>
            </div>
        </aside>
    </div>

    <script src="main.js"></script>
</body>
</html>
